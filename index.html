<!DOCTYPE html>
<!--
==========================================================
Proyecto : Fantasy Map Generator

Descripción:
Archivo principal de la aplicación.

Su función es:

- Cargar las hojas de estilo.

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Generador de Mapas de Fantasía"
    >

    <meta
        name="author"
        content="OpenAI + Asmodeus"
    >

    <title>Fantasy Map Generator</title>

    <!-- ========================= -->
    <!-- Hojas de estilo           -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="frontend/css/variables.css"
    >

    <link
        rel="stylesheet"
        href="frontend/css/main.css"
    >

    <link
        rel="stylesheet"
        href="frontend/css/mapa.css"
    >

    <link
        rel="stylesheet"
        href="frontend/css/paneles.css"
    >

    <link
        rel="stylesheet"
        href="frontend/css/botones.css"
    >

    <link
        rel="stylesheet"
        href="frontend/css/editor.css"
    >

</head>

<body>

    <!-- ====================================================== -->
    <!-- CONTENEDOR PRINCIPAL                                   -->
    <!-- ====================================================== -->

    <div id="aplicacion">

        <!-- ================================================ -->
        <!-- Barra superior                                   -->
        <!-- ================================================ -->

        <header id="barra-superior">

            <div id="logo">

                <h1>
                    Fantasy Map Generator
                </h1>

            </div>

            <nav id="barra-herramientas">

                <!--
                    Los botones se añadirán
                    durante las siguientes fases.
                -->

            </nav>

        </header>

        <!-- ================================================ -->
        <!-- Área principal                                   -->
        <!-- ================================================ -->

        <main id="contenido-principal">

            <!-- Panel izquierdo -->

            <aside id="panel-izquierdo">

                <!--
                    Paneles de edición.
                -->

            </aside>

            <!-- Área del mapa -->

            <section id="contenedor-mapa">

                <canvas id="canvas-mapa">

                    Tu navegador no soporta Canvas.

                </canvas>

            </section>

            <!-- Panel derecho -->

            <aside id="panel-derecho">

                <!--
                    Información del mundo.
                -->

            </aside>

        </main>

        <!-- ================================================ -->
        <!-- Barra inferior                                   -->
        <!-- ================================================ -->

        <footer id="barra-inferior">

            <span id="estado-aplicacion">
                Inicializando...
            </span>

        </footer>

    </div>

    <!-- ====================================================== -->
    <!-- Punto de entrada del proyecto                          -->
    <!-- ====================================================== -->

    <script
        type="module"
        src="frontend/js/main.js"
    ></script>

</body>

</html>
